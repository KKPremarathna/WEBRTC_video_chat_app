<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetLite</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="home-page">
    <div class="home-card">
      <h1>MeetLite</h1>
      <p>Create a room or join an existing room</p>

      <input type="text" id="userName" placeholder="Enter your name" />
      <input type="text" id="roomInput" placeholder="Enter room code (for join)" />

      <div class="home-buttons">
        <button id="createRoomBtn">Create Room</button>
        <button id="joinRoomBtn">Join Room</button>
      </div>

      <div class="info-box">
        <p><strong>Your room code will be simple</strong> — no localhost link, only the room code.</p>
      </div>
    </div>
  </div>

  <script src="./js/home.js"></script>
</body>
</html>
