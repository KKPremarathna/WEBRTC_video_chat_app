<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetLite | Premium Video Conferencing</title>
  <link rel="stylesheet" href="./css/style.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="home-page">
    <div class="glass-panel home-card">
      <div class="brand">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
        </div>
        <h1>MeetLite</h1>
      </div>
      <p class="subtitle">Secure, high-quality video meetings for everyone.</p>

      <div class="input-group">
        <label for="userName">Your Name</label>
        <input type="text" id="userName" placeholder="Enter your display name" autocomplete="off" />
      </div>

      <div class="action-section">
        <button id="createRoomBtn" class="btn-primary full-width">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
          New Meeting
        </button>
      </div>

      <div class="divider">
        <span>or join existing</span>
      </div>

      <div class="input-group join-group">
        <div class="input-with-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          <input type="text" id="roomInput" placeholder="Enter room code" autocomplete="off" />
        </div>
        <button id="joinRoomBtn" class="btn-secondary">Join</button>
      </div>
    </div>
    
    <div class="background-decorations">
      <div class="blur-circle circle-1"></div>
      <div class="blur-circle circle-2"></div>
    </div>
  </div>

  <script src="./js/home.js"></script>
</body>
</html>
