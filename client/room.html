<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeetLite Room</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="room-layout">
    <!-- Main Video Stage -->
    <div class="main-stage">
      <!-- Top header (Room Info) -->
      <header class="room-header glass-panel">
        <div class="room-info">
          <div class="shield-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
          </div>
          <div>
            <h2 class="room-title">Meeting Room: <span id="roomCodeText"></span></h2>
          </div>
        </div>
        <button id="copyRoomBtn" class="btn-icon-text">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          Copy Code
        </button>
      </header>

      <!-- Video Grid Container -->
      <div id="videoGrid" class="video-grid"></div>

      <!-- Bottom Control Bar -->
      <div class="bottom-bar glass-panel">
        <div class="controls-left">
          <div class="time-display" id="timeDisplay">00:00</div>
        </div>
        
        <div class="controls-center">
          <button id="toggleMicBtn" class="control-btn" title="Mute/Unmute">
            <div class="icon-wrapper">
              <svg id="micIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </div>
            <span>Mute</span>
          </button>
          
          <button id="toggleCamBtn" class="control-btn" title="Start/Stop Video">
            <div class="icon-wrapper">
              <svg id="camIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
            </div>
            <span>Stop Video</span>
          </button>
          
          <button id="shareScreenBtn" class="control-btn share-btn" title="Share Screen">
            <div class="icon-wrapper">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line><path d="m16 9-4 4-4-4"></path></svg>
            </div>
            <span>Share</span>
          </button>
        </div>

        <div class="controls-right">
          <button id="toggleSidebarBtn" class="control-btn" title="Chat & Participants">
            <div class="icon-wrapper">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            </div>
            <span>Chat</span>
          </button>
          
          <button id="leaveBtn" class="control-btn leave-btn" title="Leave Meeting">
            <div class="icon-wrapper">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Right Sidebar (Collapsible) -->
    <aside class="right-sidebar glass-panel" id="rightSidebar">
      <div class="sidebar-header">
        <h3>In-Call Messages</h3>
        <button id="closeSidebarBtn" class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <div id="chatMessages" class="chat-messages scrollbar">
        <div class="system-message">Welcome to the room! Messages are end-to-end encrypted.</div>
      </div>

      <div class="chat-input-wrapper">
        <div class="emoji-row">
          <button id="emojiToggleBtn" class="btn-icon" title="Emoji">😊</button>
          <div id="emojiPicker" class="emoji-picker glass-panel hidden">
            <span class="emoji">😀</span><span class="emoji">😂</span><span class="emoji">😍</span>
            <span class="emoji">🔥</span><span class="emoji">👍</span><span class="emoji">🎉</span>
            <span class="emoji">😎</span><span class="emoji">❤️</span><span class="emoji">🙌</span>
            <span class="emoji">😢</span>
          </div>
        </div>
        
        <div class="chat-input-area">
          <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off" />
          <button id="sendBtn" class="btn-send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>

        <div class="file-share-area">
          <label for="fileInput" class="file-label" title="Send a file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            Attach File
          </label>
          <input type="file" id="fileInput" class="hidden-input" />
          <span id="fileNameDisplay" class="file-name-display"></span>
          <button id="sendFileBtn" class="btn-secondary small hidden">Send</button>
        </div>
      </div>
    </aside>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="./js/room.js"></script>
</body>
</html>
