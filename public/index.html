<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeetNow</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="welcomeScreen" class="screen active">
      <div class="welcome-card">
        <h1>Welcome to MeetNow</h1>
        <p class="subtitle">Simple real-time video conferencing App</p>

        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="nameInput" placeholder="Enter your name" />
        </div>

        <div class="welcome-actions">
          <button id="createRoomBtn" class="primary-btn">Create Room</button>
          <button id="showJoinBtn" class="secondary-btn">Join Room</button>
        </div>

        <div id="joinRoomBox" class="join-room-box hidden">
          <label>Room ID</label>
          <input
            type="text"
            id="roomInput"
            placeholder="Example: room-7arbxe"
          />
          <small class="room-note"
            >Paste only the room ID or a shared meeting link</small
          >
          <button id="joinRoomBtn" class="primary-btn full-btn">
            Join Now
          </button>
        </div>
      </div>
    </div>

    <div id="meetingScreen" class="screen">
      <header class="meeting-header">
        <div>
          <h2>MeetNow Conference</h2>
          <p id="roomLabel">Room: -</p>
        </div>
        <div class="room-copy-box">
          <input type="text" id="roomDisplay" readonly />
          <button id="copyRoomBtn">Copy</button>
        </div>
      </header>

      <main class="meeting-layout">
        <section class="video-section">
          <div id="videoGrid" class="video-grid">
            <div class="video-card local-card">
              <video id="localVideo" autoplay muted playsinline></video>
              <div class="video-label">You</div>
            </div>
          </div>
        </section>

        <aside class="chat-section">
          <h3>Chat</h3>
          <div id="chatMessages" class="chat-messages"></div>

          <div class="chat-tools">
            <div class="emoji-wrapper">
              <button id="emojiBtn" type="button" class="tool-btn">😊</button>

              <div id="emojiPanel" class="emoji-panel hidden">
                <button type="button" class="emoji">😀</button>
                <button type="button" class="emoji">😂</button>
                <button type="button" class="emoji">😍</button>
                <button type="button" class="emoji">🔥</button>
                <button type="button" class="emoji">👍</button>
                <button type="button" class="emoji">🎉</button>
                <button type="button" class="emoji">❤️</button>
                <button type="button" class="emoji">😎</button>
                <button type="button" class="emoji">🤝</button>
                <button type="button" class="emoji">🙌</button>
              </div>
            </div>

            <button id="fileBtn" type="button" class="tool-btn">📎 File</button>
            <input type="file" id="fileInput" hidden />
          </div>

          <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message..." />
            <button id="sendBtn">Send</button>
          </div>
        </aside>
      </main>

      <footer class="control-bar">
        <button id="muteBtn">Mute</button>
        <button id="cameraBtn">Camera Off</button>
        <button id="leaveBtn" class="danger-btn">Leave Meeting</button>
      </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
